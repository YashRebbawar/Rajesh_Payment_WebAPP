<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PrintFree - Trading Account Services{% endblock %}</title>
    <link rel="icon" type="image/png" sizes="40x40" href="{{ url_for('static', filename='images/Printfree_logo.png') }}">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='images/Printfree_logo.png') }}">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/landing.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/accounts.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/account-setup.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/profile-card.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/my-accounts.css') }}">

    {% block head %}{% endblock %}
</head>
<body class="bg-white text-gray-800">
    <div class="pf-cursor-dot" id="pfCursorDot" aria-hidden="true"></div>
    <div class="pf-cursor-ring" id="pfCursorRing" aria-hidden="true"></div>
    {% block content %}{% endblock %}
    <script src="{{ url_for('static', filename='js/cursor-global.js') }}"></script>
</body>
</html>
